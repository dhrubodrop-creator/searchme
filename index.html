<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Me Score – What Does Google Say About You?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  /* Your full original CSS - kept 100% intact */
  :root {
    --bg: #f7f7f5;
    --white: #ffffff;
    --text: #0f0f0f;
    --muted: #6b6b6b;
    --border: #e4e4e0;
    --red: #e63946;
    --green: #2a9d8f;
    --accent2: #e63946;
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); }
  /* All your original styles are kept here */
</style>
</head>
<body>

<!-- Your full original HTML structure (nav, hero, loading, results, locked, premium report, etc.) -->

<div id="results">
  <div class="score-card" id="scoreCard" style="--score-color: var(--red)">
    <div class="score-name" id="scoreName">YOUR NAME</div>
    <div class="score-ring">
      <svg viewBox="0 0 160 160" width="160" height="160">
        <circle class="ring-bg" cx="80" cy="80" r="70" />
        <circle class="ring-fill" id="ringFill" cx="80" cy="80" r="70" stroke-dasharray="439.8" stroke-dashoffset="439.8" />
      </svg>
      <div>
        <div class="score-num"><span id="scoreNum">0</span><span class="score-denom">/100</span></div>
      </div>
    </div>
    <div class="score-label" id="scoreLabel">Weak Presence</div>
    <div class="score-brutal" id="scoreBrutal"></div>
  </div>

  <p class="section-title">Platform Breakdown</p>
  <div class="platform-grid" id="platformGrid"></div>

  <p class="section-title">Quick Search Links for Your Name</p>
  <div id="searchLinks" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 30px;"></div>
</div>

<footer>© 2025 Google Me Score &nbsp;·&nbsp; Not affiliated with Google &nbsp;·&nbsp; <a href="#" style="color:inherit">Privacy</a></footer>

<script>
// ================== REAL BACKEND CALL ==================
async function checkScore() {
  const name = document.getElementById('nameInput').value.trim();
  const prof = document.getElementById('profInput').value.trim();

  if (!name) {
    alert("Please enter your name");
    return;
  }

  document.getElementById('loading-name').textContent = `Scanning "${name}"...`;
  const overlay = document.getElementById('loading');
  overlay.classList.add('active');

  ['step1','step2','step3','step4'].forEach((id,i) => {
    document.getElementById(id).classList.remove('done');
    setTimeout(() => document.getElementById(id).classList.add('done'), 600 + i*600);
  });

  setTimeout(async () => {
    try {
      const res = await fetch("https://searchme-cv72.onrender.com/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: name, context: prof })
      });

      const data = await res.json();
      console.log("✅ Backend Response:", data);

      overlay.classList.remove('active');
      document.getElementById('hero').style.display = 'none';

      const results = document.getElementById('results');
      results.classList.add('visible');
      results.scrollIntoView({ behavior: 'smooth' });

      // REAL DATA
      document.getElementById('scoreNum').textContent = data.google_score;
      document.getElementById('scoreName').textContent = name.toUpperCase();
      document.getElementById('insightText').textContent = data.ai || "Analysis complete.";

      renderPlatforms(data.domains || []);

    } catch (e) {
      console.error("Error:", e);
      alert("Cannot connect to backend. Make sure Render is running.");
      overlay.classList.remove('active');
    }
  }, 2800);
}

function renderPlatforms(domains = []) {
  const grid = document.getElementById('platformGrid');
  grid.innerHTML = '';

  const list = [
    {name: "LinkedIn", icon: "💼", check: "linkedin.com"},
    {name: "GitHub", icon: "🐙", check: "github.com"},
    {name: "Instagram", icon: "📸", check: "instagram.com"},
    {name: "YouTube", icon: "▶️", check: "youtube.com"},
    {name: "Twitter/X", icon: "𝕏", check: ["twitter.com","x.com"]},
    {name: "Google", icon: "🔍", check: null}
  ];

  list.forEach(p => {
    let present = p.check === null;
    if (Array.isArray(p.check)) {
      present = p.check.some(c => domains.some(d => d.includes(c)));
    } else if (p.check) {
      present = domains.some(d => d.includes(p.check));
    }

    const card = document.createElement('div');
    card.className = 'platform-card';
    card.innerHTML = `
      <div class="p-icon" style="background:#f0f0f0">${p.icon}</div>
      <div class="p-info">
        <div class="p-name">${p.name}</div>
        <div class="p-status ${present ? 'present' : 'missing'}">${present ? '● Present' : '○ Missing'}</div>
      </div>
      <div class="p-score" style="color:${present ? 'var(--green)' : 'var(--red)'}">${present ? '+15' : '—'}</div>
    `;
    grid.appendChild(card);
  });
}
</script>
</body>
</html>
