<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Me Score</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f7f7f5; --white: #ffffff; --text: #0f0f0f; --muted: #6b6b6b; --border: #e4e4e0; --accent2: #e63946; --green: #2a9d8f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }
        nav { background: var(--white); padding: 15px 24px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-logo { font-family: 'Syne'; font-weight: 800; font-size: 1.2rem; }
        .nav-logo span { color: var(--accent2); }
        .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; padding: 20px; }
        h1 { font-family: 'Syne'; font-size: 2.5rem; line-height: 1.1; margin-bottom: 20px; }
        .hero-card { background: white; border-radius: 16px; padding: 30px; width: 100%; max-width: 400px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 10px; outline: none; font-size: 1rem; }
        .cta-btn { width: 100%; padding: 16px; background: var(--text); color: white; border: none; border-radius: 10px; font-family: 'Syne'; font-weight: 700; cursor: pointer; font-size: 1.1rem; }
        
        #results { display: none; max-width: 500px; margin: 0 auto; padding: 20px; }
        .score-card { background: white; border-radius: 20px; padding: 40px 20px; text-align: center; border: 1px solid var(--border); margin-bottom: 20px; }
        .score-ring { width: 180px; height: 180px; margin: 0 auto 20px; position: relative; display: flex; align-items: center; justify-content: center; }
        .score-ring svg { position: absolute; transform: rotate(-90deg); }
        .ring-fill { stroke: var(--accent2); transition: stroke-dashoffset 1.5s ease; }
        .score-num { font-family: 'Syne'; font-size: 3.5rem; font-weight: 800; color: var(--accent2); }
        .platform-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 15px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .p-status.present { color: var(--green); font-weight: 700; }
        .p-status.missing { color: var(--accent2); font-weight: 700; }
        .insight-block { background: #1a1a2e; color: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(247,247,245,0.98); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
        .loading-overlay.active { display: flex; }
        .spinner { width: 50px; height: 50px; border: 5px solid #eee; border-top-color: var(--accent2); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav><div class="nav-logo"><span>G</span>oogle Me Score</div><div style="background:#fde8ea; color:#e63946; padding:5px 10px; border-radius:20px; font-size:0.7rem; font-weight:700;">₹9 UNLOCK</div></nav>

<div class="loading-overlay" id="loader"><div class="spinner"></div><div style="font-weight:700">Analyzing Digital Footprint...</div></div>

<section class="hero" id="hero">
    <h1>What does Google<br>say about <em>you?</em></h1>
    <div class="hero-card">
        <div class="input-group"><label>Full Name</label><input type="text" id="nameInput" placeholder="Elon Musk"></div>
        <button class="cta-btn" onclick="runAudit()">Check My Score</button>
    </div>
</section>

<div id="results">
    <div class="score-card">
        <div id="resName" style="font-weight:700; color:var(--muted); margin-bottom:15px; letter-spacing:1px;">NAME</div>
        <div class="score-ring">
            <svg viewBox="0 0 160 160" width="160" height="160">
                <circle cx="80" cy="80" r="70" stroke="#eee" stroke-width="10" fill="none" />
                <circle id="ringFill" cx="80" cy="80" r="70" stroke="#e63946" stroke-width="12" fill="none" stroke-dasharray="439.8" stroke-dashoffset="439.8" />
            </svg>
            <div class="score-num" id="scoreValue">0</div>
        </div>
        <h2 id="scoreLabel" style="font-family:'Syne'; margin-bottom:5px;">Average Presence</h2>
        <p id="brutalText" style="color:var(--muted); font-size:0.9rem;">Wait...</p>
    </div>

    <div style="font-weight:700; margin-bottom:10px;">Platform Breakdown</div>
    <div id="platformGrid"></div>

    <div class="insight-block">
        <div style="color:var(--accent2); font-weight:800; font-size:0.7rem; margin-bottom:10px; letter-spacing:1px;">REPUTATION INSIGHT</div>
        <p id="insightText" style="font-weight:500;"></p>
    </div>
    
    <div style="background:white; border:1px dashed var(--border); padding:30px; border-radius:16px; text-align:center;">
        <div style="font-size:2rem; margin-bottom:10px;">🔒</div>
        <div style="font-weight:700; margin-bottom:15px;">Full Report Locked</div>
        <button class="cta-btn" style="background:var(--accent2)" onclick="alert('Redirecting to Payment...')">Unlock Full Report — ₹9</button>
    </div>
</div>

<script>
async function runAudit() {
    const name = document.getElementById('nameInput').value.trim();
    if(!name) return alert("Enter Name");

    document.getElementById('loader').classList.add('active');

    try {
        const res = await fetch("https://searchme-cv72.onrender.com/analyze", {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name: name, context: "" })
        });

        const data = await res.json();

        document.getElementById('loader').classList.remove('active');
        document.getElementById('hero').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        
        // 1. DATA MAPPING (FORCE MATCH)
        const score = data.google_score || 0;
        document.getElementById('resName').innerText = name.toUpperCase();
        document.getElementById('scoreValue').innerText = score;
        document.getElementById('insightText').innerText = data.ai;
        document.getElementById('brutalText').innerText = score < 50 ? "You're forgettable online." : "You show up, but not strongly.";
        
        // 2. RING ANIMATION
        document.getElementById('ringFill').style.strokeDashoffset = 439.8 - (439.8 * score / 100);

        // 3. PLATFORMS
        const grid = document.getElementById('platformGrid');
        grid.innerHTML = '';
        const sites = {'linkedin.com': 'LinkedIn', 'github': 'GitHub', 'instagram': 'Instagram', 'twitter.com': 'Twitter/X'};
        
        Object.keys(sites).forEach(domain => {
            const found = (data.domains || []).some(l => l.toLowerCase().includes(domain));
            grid.innerHTML += `
                <div class="platform-card">
                    <div style="font-weight:600;">${sites[domain]}</div>
                    <div class="p-status ${found ? 'present' : 'missing'}">${found ? '● Present' : '○ Missing'}</div>
                </div>`;
        });

    } catch (e) {
        alert("Server error. Try again.");
        document.getElementById('loader').classList.remove('active');
    }
}
</script>
</body>
</html>
