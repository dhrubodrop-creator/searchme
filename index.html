<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Me Score – What Does Google Say About You?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* ALL YOUR ORIGINAL STYLES PRESERVED - NO CHANGES TO UI/UX */
        :root { --bg: #f7f7f5; --white: #ffffff; --text: #0f0f0f; --muted: #6b6b6b; --border: #e4e4e0; --red: #e63946; --red-light: #fde8ea; --yellow: #f4a261; --yellow-light: #fef3e8; --green: #2a9d8f; --green-light: #e6f5f3; --accent: #1a1a2e; --accent2: #e63946; --blue: #3b82f6; --blue-light: #eff6ff; --purple: #7c3aed; --purple-light: #f5f3ff; --shadow-sm: 0 1px 4px rgba(0,0,0,0.06), 0 2px 12px rgba(0,0,0,0.04); --shadow-md: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04); --shadow-lg: 0 12px 48px rgba(0,0,0,0.12); --radius: 16px; --radius-sm: 10px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        nav { position: sticky; top: 0; z-index: 100; background: rgba(247,247,245,0.88); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .nav-logo span { color: var(--accent2); }
        .nav-badge { background: var(--red-light); color: var(--red); font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.04em; }
        .hero { min-height: 92vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px 48px; text-align: center; position: relative; overflow: hidden; }
        .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 70% 50% at 50% -10%, rgba(230,57,70,0.07) 0%, transparent 70%), radial-gradient(ellipse 50% 40% at 80% 100%, rgba(42,157,143,0.05) 0%, transparent 60%); pointer-events: none; }
        .hero-eyebrow { display: inline-flex; align-items: center; gap: 6px; background: var(--white); border: 1px solid var(--border); border-radius: 100px; padding: 6px 14px; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 28px; box-shadow: var(--shadow-sm); animation: fadeUp 0.5s ease both; }
        .hero-eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.3)} }
        h1 { font-family: 'Syne', sans-serif; font-size: clamp(2.2rem, 6vw, 4.2rem); font-weight: 800; line-height: 1.08; letter-spacing: -0.03em; color: var(--text); margin-bottom: 20px; animation: fadeUp 0.5s 0.1s ease both; }
        h1 em { font-style: normal; color: var(--accent2); }
        .hero-sub { font-size: clamp(1rem, 2.5vw, 1.2rem); color: var(--muted); max-width: 480px; margin: 0 auto 40px; font-weight: 400; animation: fadeUp 0.5s 0.2s ease both; }
        .hero-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; max-width: 480px; width: 100%; box-shadow: var(--shadow-md); animation: fadeUp 0.5s 0.3s ease both; }
        .input-group { margin-bottom: 14px; }
        .input-group label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 14px 16px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm); outline: none; color: var(--text); transition: border-color 0.2s, box-shadow 0.2s; }
        .input-group input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(230,57,70,0.08); }
        .cta-btn { width: 100%; margin-top: 8px; padding: 16px 24px; background: var(--text); color: var(--white); font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 700; border: none; border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform 0.15s, box-shadow 0.15s, background 0.15s; letter-spacing: -0.01em; }
        .cta-btn:hover { background: #1a1a1a; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.18); }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        #results { display: none; max-width: 720px; margin: 0 auto; padding: 0 24px 80px; animation: fadeUp 0.5s ease both; }
        #results.visible { display: block; }
        .score-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 32px; text-align: center; box-shadow: var(--shadow-md); margin-bottom: 20px; position: relative; overflow: hidden; }
        .score-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--score-color, var(--red)); }
        .score-name { font-size: 0.85rem; font-weight: 600; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 24px; }
        .score-ring { width: 160px; height: 160px; margin: 0 auto 24px; position: relative; display: flex; align-items: center; justify-content: center; }
        .score-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
        .score-ring circle { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1); }
        .ring-bg { stroke: var(--border); }
        .ring-fill { stroke: var(--score-color, var(--red)); }
        .score-num { font-family: 'Syne', sans-serif; font-size: 3.2rem; font-weight: 800; line-height: 1; color: var(--score-color, var(--red)); position: relative; z-index: 1; }
        .score-label { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 10px; }
        .score-brutal { font-size: 1.05rem; color: var(--muted); font-weight: 400; }
        .platform-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .platform-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px 16px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow-sm); transition: transform 0.15s, box-shadow 0.15s; }
        .p-name { font-weight: 600; font-size: 0.9rem; color: var(--text); margin-bottom: 3px; }
        .p-status { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.04em; }
        .p-status.present { color: var(--green); }
        .p-status.missing { color: var(--red); }
        .insight-block { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border-radius: var(--radius); padding: 32px; color: white; margin-bottom: 20px; position: relative; overflow: hidden; }
        .insight-tag { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent2); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .insight-text { font-family: 'Syne', sans-serif; font-size: clamp(1.1rem, 3vw, 1.4rem); font-weight: 700; line-height: 1.4; color: white; }
        .locked-section { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-md); margin-bottom: 20px; position: relative; }
        .locked-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); }
        .pay-btn { padding: 18px 24px; background: var(--accent2); color: white; border-radius: var(--radius-sm); border: none; font-weight: 800; cursor: pointer; }
        .ipaid-btn { margin-top: 10px; display: none; color: var(--green); border: 1px solid var(--green); background: white; padding: 10px; border-radius: 8px; cursor: pointer; }
        .ipaid-btn.show { display: block; }
        .loading-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(247,247,245,0.92); backdrop-filter: blur(8px); flex-direction: column; align-items: center; justify-content: center; }
        .loading-overlay.active { display: flex; }
        .loading-spinner { width: 56px; height: 56px; border: 3px solid var(--border); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #premiumReport { display: none; margin-top: 20px; }
        #premiumReport.revealed { display: block; }
        .report-header { background: #0f172a; border-radius: var(--radius); padding: 32px; color: white; margin-bottom: 16px; }
        .diag-score-bar { background: #ddd; height: 10px; border-radius: 100px; margin: 10px 0; overflow: hidden; }
        .diag-score-fill { height: 100%; transition: width 1s; }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo"><span>G</span>oogle Me Score</div>
    <div class="nav-badge">🔒 ₹9 UNLOCK</div>
</nav>

<div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <div style="color:var(--muted)">Analyzing your digital footprint...</div>
</div>

<section class="hero" id="hero">
    <div class="hero-eyebrow"><div class="dot"></div>AI-Powered Digital Audit</div>
    <h1>What does<br>Google say<br>about <em>you?</em></h1>
    <p class="hero-sub">Enter your name to see your real search score.</p>
    <div class="hero-card">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="nameInput" placeholder="Elon Musk">
        </div>
        <div class="input-group">
            <label>Profession (optional)</label>
            <input type="text" id="profInput" placeholder="Tech CEO">
        </div>
        <button class="cta-btn" id="checkBtn">Check My Score</button>
    </div>
</section>

<div id="results">
    <div class="score-card">
        <div class="score-name" id="scoreName">NAME</div>
        <div class="score-ring">
            <svg viewBox="0 0 160 160" width="160" height="160">
                <circle class="ring-bg" cx="80" cy="80" r="70" />
                <circle id="ringFill" class="ring-fill" cx="80" cy="80" r="70" stroke-dasharray="439.82" stroke-dashoffset="439.82" />
            </svg>
            <div class="score-num"><span id="scoreNum">0</span><span style="font-size:1.1rem; color:var(--muted)">/100</span></div>
        </div>
        <div class="score-label" id="scoreLabel">Analyzing...</div>
        <div class="score-brutal" id="scoreBrutal">Thinking...</div>
    </div>

    <div class="platform-grid" id="platformGrid"></div>

    <div class="insight-block">
        <div class="insight-tag">AI Verdict</div>
        <div class="insight-text" id="insightText">Processing...</div>
    </div>

    <div class="locked-section" id="lockedSection">
        <div class="locked-overlay">
            <button class="pay-btn" id="payBtn">Unlock Full Audit — ₹9</button>
            <button class="ipaid-btn" id="ipaidBtn">✓ I Paid — Unlock</button>
        </div>
    </div>

    <div id="premiumReport">
        <div class="report-header">
            <div id="rptName" style="font-weight:700">Name</div>
            <div id="rptScoreDisplay" style="font-size:3rem">0</div>
        </div>
        <div style="background:white; padding:20px; border-radius:16px;">
            <h3>AI Diagnosis</h3>
            <div class="diag-score-bar"><div class="diag-score-fill" id="diagBar"></div></div>
            <p id="diagText"></p>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
