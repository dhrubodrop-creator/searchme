<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Me Score – What Does Google Say About You?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* CSS PRESERVED - UI/UX WILL REMAIN IDENTICAL */
        :root { --bg: #f7f7f5; --white: #ffffff; --text: #0f0f0f; --muted: #6b6b6b; --border: #e4e4e0; --red: #e63946; --red-light: #fde8ea; --yellow: #f4a261; --yellow-light: #fef3e8; --green: #2a9d8f; --green-light: #e6f5f3; --accent: #1a1a2e; --accent2: #e63946; --blue: #3b82f6; --blue-light: #eff6ff; --purple: #7c3aed; --purple-light: #f5f3ff; --shadow-sm: 0 1px 4px rgba(0,0,0,0.06), 0 2px 12px rgba(0,0,0,0.04); --shadow-md: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04); --shadow-lg: 0 12px 48px rgba(0,0,0,0.12); --radius: 16px; --radius-sm: 10px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        nav { position: sticky; top: 0; z-index: 100; background: rgba(247,247,245,0.88); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .nav-logo span { color: var(--accent2); }
        .nav-badge { background: var(--red-light); color: var(--red); font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.04em; }
        .hero { min-height: 92vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px 48px; text-align: center; position: relative; }
        .hero-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; max-width: 480px; width: 100%; box-shadow: var(--shadow-md); }
        .input-group { margin-bottom: 14px; text-align: left; }
        .input-group label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); outline: none; }
        .cta-btn { width: 100%; padding: 16px 24px; background: var(--text); color: var(--white); font-family: 'Syne', sans-serif; font-weight: 700; border-radius: var(--radius-sm); cursor: pointer; border: none; }
        #results { display: none; max-width: 720px; margin: 0 auto; padding: 40px 24px; }
        #results.visible { display: block; }
        .score-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; text-align: center; box-shadow: var(--shadow-md); margin-bottom: 20px; }
        .score-ring { width: 160px; height: 160px; margin: 0 auto 24px; position: relative; display: flex; align-items: center; justify-content: center; }
        .score-ring svg { position: absolute; transform: rotate(-90deg); }
        .score-ring circle { fill: none; stroke-width: 10; stroke-linecap: round; }
        .ring-bg { stroke: var(--border); }
        .ring-fill { stroke: var(--accent2); transition: stroke-dashoffset 1s ease; }
        .score-num { font-family: 'Syne', sans-serif; font-size: 3.2rem; font-weight: 800; color: var(--accent2); }
        .platform-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-top: 20px; }
        .platform-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px; box-shadow: var(--shadow-sm); }
        .p-name { font-weight: 600; font-size: 0.9rem; }
        .p-status.present { color: var(--green); }
        .p-status.missing { color: var(--red); }
        .insight-block { background: #1a1a2e; border-radius: var(--radius); padding: 32px; color: white; margin-top: 20px; }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(247,247,245,0.9); z-index: 200; align-items: center; justify-content: center; flex-direction: column; }
        .loading-overlay.active { display: flex; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: var(--accent2); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav><div class="nav-logo"><span>G</span>oogle Me Score</div></nav>

<div class="loading-overlay" id="loader"><div class="spinner"></div><div>Analyzing...</div></div>

<section class="hero" id="hero">
    <h1>Google <em>Audit.</em></h1>
    <div class="hero-card">
        <div class="input-group"><label>Full Name</label><input type="text" id="nameInput" placeholder="Enter name"></div>
        <button class="cta-btn" onclick="runAudit()">Check My Score</button>
    </div>
</section>

<div id="results">
    <div class="score-card">
        <div id="resName" style="font-weight:600; margin-bottom:10px;">NAME</div>
        <div class="score-ring">
            <svg viewBox="0 0 160 160" width="160" height="160">
                <circle class="ring-bg" cx="80" cy="80" r="70" />
                <circle id="ringFill" class="ring-fill" cx="80" cy="80" r="70" stroke-dasharray="439.8" stroke-dashoffset="439.8" />
            </svg>
            <div class="score-num" id="scoreValue">0</div>
        </div>
        <h2 id="scoreLabel">Average Presence</h2>
    </div>

    <div class="insight-block">
        <div style="color:var(--accent2); font-weight:700; margin-bottom:10px;">AI VERDICT</div>
        <div id="verdictText">Waiting for analysis...</div>
    </div>

    <div class="platform-grid" id="platformGrid"></div>
</div>
